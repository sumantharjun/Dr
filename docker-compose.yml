version: "3.9"

# Database is hosted on Hostinger — no local db container needed.
# Before running:
#   1. cp docker-compose.env.example .env  and fill in values
#   2. bash generate-certs.sh  (or place real certs in nginx/certs/)
#   3. docker compose up --build -d

services:

  backend:
    build: ./backend
    container_name: baby_feeding_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Override CORS_ORIGINS for production domain if needed
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173,http://localhost:3000}

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8000}
    container_name: baby_feeding_frontend
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: baby_feeding_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
      - frontend
