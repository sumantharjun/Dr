<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" role="img" aria-label="Bottle brush set">
  <rect width="400" height="300" fill="#fef3e2"/>
  <g transform="translate(200 120) rotate(20)">
    <!-- handle -->
    <rect x="-8" y="20" width="16" height="80" rx="8" fill="#b45309"/>
    <circle cx="0" cy="104" r="12" fill="#92400e"/>
    <!-- brush head -->
    <ellipse cx="0" cy="-30" rx="34" ry="56" fill="#f59e0b"/>
    <g stroke="#fbbf24" stroke-width="4" stroke-linecap="round">
      <line x1="-34" y1="-60" x2="-58" y2="-72"/>
      <line x1="-36" y1="-30" x2="-62" y2="-30"/>
      <line x1="-34" y1="0" x2="-58" y2="12"/>
      <line x1="34" y1="-60" x2="58" y2="-72"/>
      <line x1="36" y1="-30" x2="62" y2="-30"/>
      <line x1="34" y1="0" x2="58" y2="12"/>
    </g>
    <rect x="-10" y="-30" width="20" height="60" rx="10" fill="#d97706"/>
  </g>
  <text x="200" y="250" text-anchor="middle" font-family="system-ui,Segoe UI,Roboto,sans-serif" font-size="24" font-weight="700" fill="#b45309">Bottle Brush Set</text>
  <text x="200" y="278" text-anchor="middle" font-family="system-ui,Segoe UI,Roboto,sans-serif" font-size="18" fill="#d97706">Soft-bristle · Manual clean</text>
</svg>
